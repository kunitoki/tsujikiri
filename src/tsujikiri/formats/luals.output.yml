format_name: luals
format_version: "1.0"
description: "Lua Language Server (LuaLS) type annotation stubs — use alongside LuaBridge3 bindings"
language: lua

unsupported_types:
  - CFStringRef
  - OSType

type_mappings:
  "int": "integer"
  "unsigned int": "integer"
  "long": "integer"
  "unsigned long": "integer"
  "short": "integer"
  "unsigned short": "integer"
  "int8_t": "integer"
  "int16_t": "integer"
  "int32_t": "integer"
  "int64_t": "integer"
  "uint8_t": "integer"
  "uint16_t": "integer"
  "uint32_t": "integer"
  "uint64_t": "integer"
  "size_t": "integer"
  "float": "number"
  "double": "number"
  "bool": "boolean"
  "std::string": "string"
  "const char *": "string"
  "char *": "string"
  "std::string_view": "string"
  "void": "nil"

template_file: "luals.output.tpl"
