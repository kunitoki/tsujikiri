format_name: pyi
format_version: "1.0"
description: "Python type stub (.pyi) annotations — use alongside pybind11 bindings"
language: python

unsupported_types:
  - CFStringRef
  - OSType

type_mappings:
  "int": "int"
  "unsigned int": "int"
  "long": "int"
  "unsigned long": "int"
  "short": "int"
  "unsigned short": "int"
  "int8_t": "int"
  "int16_t": "int"
  "int32_t": "int"
  "int64_t": "int"
  "uint8_t": "int"
  "uint16_t": "int"
  "uint32_t": "int"
  "uint64_t": "int"
  "size_t": "int"
  "float": "float"
  "double": "float"
  "bool": "bool"
  "std::string": "str"
  "char *": "str"
  "std::string_view": "str"
  "void": "None"

template_file: "pyi.output.tpl"
