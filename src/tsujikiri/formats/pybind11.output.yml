format_name: pybind11
format_version: "1.0"
description: "pybind11 C++ to Python binding templates"

unsupported_types:
  - CFStringRef
  - OSType

type_mappings: {}

templates:
  line_comment: "//"

  prologue: |
    // DO NOT EDIT — Auto-generated pybind11 bindings for {module_name} by tsujikiri
    #include <pybind11/pybind11.h>
    namespace py = pybind11;

    PYBIND11_MODULE({module_name}, m)
    {{

  epilogue: |
    }}

  module_name: "{module_name}"

  # ---- Class ----
  class_begin: |
      py::class_<{qualified_class_name}>(m, "{class_name}")
  class_derived_begin: |
      py::class_<{qualified_class_name}, {class_base_name}>(m, "{class_name}")
  class_end: |
      ;

  class_methods_begin: ""
  class_methods_end: ""

  # ---- Regular methods ----
  class_method_begin: |
          {method_comment}.def("{method_name}", &{qualified_class_name}::{method_spelling})
  class_method_end: ""

  class_overloaded_method_begin: |
          {method_comment}.def("{method_name}", static_cast<{method_return} ({qualified_class_name}::*)({method_args}){method_is_const}>(&{qualified_class_name}::{method_spelling}))
  class_overloaded_method_end: ""

  # ---- Static methods ----
  class_static_method_begin: |
          {method_comment}.def_static("{method_name}", &{qualified_class_name}::{method_spelling})
  class_static_method_end: ""

  class_overloaded_static_method_begin: |
          {method_comment}.def_static("{method_name}", static_cast<{method_return} (*)({method_args})>(&{qualified_class_name}::{method_spelling}))
  class_overloaded_static_method_end: ""

  class_overload_const_definition: " const"

  # ---- Constructors ----
  class_constructor_begin: |
          {method_comment}.def(py::init<{constructor_args}>())
  class_constructor_end: ""

  class_overloaded_constructor_begin: |
          {method_comment}.def(py::init<{constructor_args}>())
  class_overloaded_constructor_end: ""

  # ---- Fields / Properties ----
  class_field_begin: |
          {field_comment}.def_readwrite("{field_name}", &{qualified_class_name}::{field_name})
  class_field_end: ""

  class_readonly_field_begin: |
          {field_comment}.def_readonly("{field_name}", &{qualified_class_name}::{field_name})
  class_readonly_field_end: ""

  # ---- Free functions ----
  function_begin: |
      {function_comment}m.def("{function_name}", &{function_spelling});
  function_end: ""

  function_overloaded_begin: |
      {function_comment}m.def("{function_name}", static_cast<{function_return} (*)({function_args})>(&{function_spelling}));
  function_overloaded_end: ""

  # ---- Enums ----
  enum_begin: |
      py::enum_<{qualified_enum_name}>(m, "{enum_name}")
  enum_end: |
          .export_values();
  enum_value: |
          .value("{value_name}", {qualified_enum_name}::{value_name})
