format_name: pybind11
format_version: "1.0"
description: "pybind11 C++ to Python binding templates"
language: cpp

# Types that force a method/function/field to be excluded from output
unsupported_types:
  - CFStringRef
  - OSType

# Optional C++ → target-language type remapping (use add_type_mapping transform)
type_mappings:
  "std::string_view": "std::string"

# C++ operator overload → Python dunder method name mapping
# operator<< maps to __repr__ to generate a lambda using std::ostringstream
# operator= is intentionally omitted — it has no Python dunder equivalent
operator_mappings:
  "operator+": "__add__"
  "operator+unary": "__pos__"
  "operator-": "__sub__"
  "operator-unary": "__neg__"
  "operator*": "__mul__"
  "operator/": "__truediv__"
  "operator%": "__mod__"
  "operator+=": "__iadd__"
  "operator-=": "__isub__"
  "operator*=": "__imul__"
  "operator/=": "__itruediv__"
  "operator%=": "__imod__"
  "operator&": "__and__"
  "operator|": "__or__"
  "operator^": "__xor__"
  "operator~": "__invert__"
  "operator&=": "__iand__"
  "operator|=": "__ior__"
  "operator^=": "__ixor__"
  "operator==": "__eq__"
  "operator!=": "__ne__"
  "operator<": "__lt__"
  "operator<=": "__le__"
  "operator>": "__gt__"
  "operator>=": "__ge__"
  "operator<<": "__repr__"
  "operator>>": "__rshift__"
  "operator[]": "__getitem__"
  "operator()": "__call__"
  "operator!": "__bool__"
  "operator bool": "__bool__"
  "operator int": "__int__"
  "operator long": "__int__"
  "operator long long": "__int__"
  "operator float": "__float__"
  "operator double": "__float__"
  "operator std::string": "__str__"
  "operator size_t": "__index__"

template_file: "pybind11.output.tpl"
