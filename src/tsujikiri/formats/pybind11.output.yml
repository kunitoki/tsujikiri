format_name: pybind11
format_version: "1.0"
description: "pybind11 C++ to Python binding templates"
language: cpp

# Types that force a method/function/field to be excluded from output
unsupported_types:
  - CFStringRef
  - OSType

# Optional C++ → target-language type remapping (use add_type_mapping transform)
type_mappings: {}

template: |
  {%- block prologue -%}
  // DO NOT EDIT - Auto-generated pybind11 bindings for {{ module_name }} by tsujikiri
  #include <pybind11/pybind11.h>
  #include <pybind11/stl.h>

  namespace py = pybind11;
  {% for inc in includes %}
  #include {{ inc }}
  {%- endfor %}
  {%- block api_version %}
  {%- if api_version %}

  static constexpr const char* k_{{ module_name }}_api_version = "{{ api_version }}";
  {%- endif %}
  {%- endblock %}

  PYBIND11_MODULE({{ module_name }}, m)
  {
  {{ code_injections | code_at("beginning") }}
  {%- endblock %}
  {%- block api_version_registration %}
  {%- if api_version %}
    m.attr("__api_version__") = k_{{ module_name }}_api_version;
  {%- endif %}
  {%- endblock %}
  {%- for enum in enums %}
  {%- block enum scoped %}

    py::enum_<{{ enum.qualified_name }}>(m, "{{ enum.name }}"{% if enum.doc %}, "{{ enum.doc }}"{% endif %})
  {%- for value in enum.values %}
  {%- block enum_value scoped %}
      .value("{{ value.name }}", {{ enum.qualified_name }}::{{ value.original_name }}{% if value.doc %}, "{{ value.doc }}"{% endif %})
  {%- endblock %}
  {%- endfor %}
      .export_values();
  {%- endblock %}
  {%- endfor %}
  {%- for group in function_groups %}
  {%- block function_group scoped %}
  {%- if group.is_overloaded %}
  {%- for fn in group.functions %}
  {%- block function_overloaded scoped %}
  {%- if fn.wrapper_code %}
    m.def("{{ group.name | camel_to_snake }}", {{ fn.wrapper_code }}{% if fn.doc %}, "{{ fn.doc }}"{% endif %});
  {%- else %}
    m.def("{{ group.name | camel_to_snake }}", py::overload_cast<{{ fn.params | map(attribute='raw_type') | join(', ') }}>(&{{ fn.spelling }}){% for p in fn.params %}, py::arg("{{ p.name }}"){% if p.default %} = {{ p.default }}{% endif %}{% endfor %}{% if fn.doc %}, "{{ fn.doc }}"{% endif %});
  {%- endif %}
  {%- endblock %}
  {%- endfor %}
  {%- else %}
  {%- set fn = group.functions[0] %}
  {%- if fn.wrapper_code %}
    m.def("{{ group.name | camel_to_snake }}", {{ fn.wrapper_code }}{% if fn.doc %}, "{{ fn.doc }}"{% endif %});
  {%- else %}
    m.def("{{ group.name | camel_to_snake }}", &{{ fn.spelling }}{% for p in fn.params %}, py::arg("{{ p.name }}"){% if p.default %} = {{ p.default }}{% endif %}{% endfor %}{% if fn.doc %}, "{{ fn.doc }}"{% endif %});
  {%- endif %}
  {%- endif %}
  {%- endblock %}
  {%- endfor %}
  {%- for cls in classes %}
  {%- block class scoped %}

    py::class_<{{ cls.qualified_name }}{% for b in cls.public_bases %}, {{ b.qualified_name }}{% endfor %}>(m, "{{ cls.name }}"{% if cls.doc %}, "{{ cls.doc }}"{% endif %})
  {{ cls.code_injections | code_at("beginning") }}
  {%- block class_constructors scoped %}
  {%- if not cls.force_abstract %}
  {%- for ctor in cls.constructor_group.constructors %}
  {%- block class_constructor_group scoped %}
      .def(py::init<{{ ctor.params | map(attribute='raw_type') | join(', ') }}>(){% if ctor.doc %}, "{{ ctor.doc }}"{% endif %})
  {%- endblock %}
  {%- endfor %}
  {%- endif %}
  {%- endblock %}
  {%- block class_methods scoped %}
  {%- for group in cls.method_groups %}
  {%- if group.is_static %}
  {%- block class_static_method_group scoped %}
  {%- if group.is_overloaded %}
  {%- for method in group.methods %}
  {%- block class_overloaded_static_method scoped %}
      .def_static("{{ group.name | camel_to_snake }}", py::overload_cast<{{ method.params | map(attribute='raw_type') | join(', ') }}>(&{{ cls.qualified_name }}::{{ method.spelling }}){% for p in method.params %}, py::arg("{{ p.name }}"){% if p.default %} = {{ p.default }}{% endif %}{% endfor %}{% if method.doc %}, "{{ method.doc }}"{% endif %})
  {%- endblock %}
  {%- endfor %}
  {%- else %}
  {%- set method = group.methods[0] %}
  {%- if method.wrapper_code %}
      .def_static("{{ group.name | camel_to_snake }}", {{ method.wrapper_code }}{% if method.doc %}, "{{ method.doc }}"{% endif %})
  {%- else %}
      .def_static("{{ group.name | camel_to_snake }}", &{{ cls.qualified_name }}::{{ method.spelling }}{% for p in method.params %}, py::arg("{{ p.name }}"){% if p.default %} = {{ p.default }}{% endif %}{% endfor %}{% if method.doc %}, "{{ method.doc }}"{% endif %})
  {%- endif %}
  {%- endif %}
  {%- endblock %}
  {%- else %}
  {%- block class_method_group scoped %}
  {%- if group.is_overloaded %}
  {%- for method in group.methods %}
  {%- block class_overloaded_method scoped %}
      .def("{{ group.name | camel_to_snake }}", py::overload_cast<{{ method.params | map(attribute='raw_type') | join(', ') }}>(&{{ cls.qualified_name }}::{{ method.spelling }}{% if method.is_const %}, py::const_{% endif %}){% for p in method.params %}, py::arg("{{ p.name }}"){% if p.default %} = {{ p.default }}{% endif %}{% endfor %}{% if method.doc %}, "{{ method.doc }}"{% endif %})
  {%- endblock %}
  {%- endfor %}
  {%- else %}
  {%- set method = group.methods[0] %}
  {%- if method.wrapper_code %}
      .def("{{ group.name | camel_to_snake }}", {{ method.wrapper_code }}{% if method.doc %}, "{{ method.doc }}"{% endif %})
  {%- else %}
      .def("{{ group.name | camel_to_snake }}", &{{ cls.qualified_name }}::{{ method.spelling }}{% for p in method.params %}, py::arg("{{ p.name }}"){% if p.default %} = {{ p.default }}{% endif %}{% endfor %}{% if method.doc %}, "{{ method.doc }}"{% endif %})
  {%- endif %}
  {%- endif %}
  {%- endblock %}
  {%- endif %}
  {%- endfor %}
  {%- endblock %}
  {%- block class_fields scoped %}
  {%- for field in cls.fields %}
  {%- block class_field scoped %}
  {%- if field.read_only %}
      .def_readonly("{{ field.name | camel_to_snake }}", &{{ cls.qualified_name }}::{{ field.name }}{% if field.doc %}, "{{ field.doc }}"{% endif %})
  {%- else %}
      .def_readwrite("{{ field.name | camel_to_snake }}", &{{ cls.qualified_name }}::{{ field.name }}{% if field.doc %}, "{{ field.doc }}"{% endif %})
  {%- endif %}
  {%- endblock %}
  {%- endfor %}
  {%- endblock %}
  {{ cls.code_injections | code_at("end") }}
      ;
  {%- endblock %}
  {%- endfor %}
  {{ code_injections | code_at("end") }}
  {%- block epilogue %}
  }
  {%- endblock %}
