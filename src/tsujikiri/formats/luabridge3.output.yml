format_name: luabridge3
format_version: "1.0"
description: "LuaBridge3 C++ to Lua binding templates"
language: cpp

# Types that force a method/function/field to be excluded from output
unsupported_types:
  - CFStringRef
  - OSType

# Optional C++ → target-language type remapping (use add_type_mapping transform)
type_mappings: {}

template: |
  {%- block prologue -%}
  // DO NOT EDIT - Auto-generated LuaBridge3 bindings for {{ module_name }} by tsujikiri
  extern "C" {
  #include <lua.h>
  #include <lualib.h>
  #include <lauxlib.h>
  } // extern "C"

  #include <LuaBridge/LuaBridge.h>

  #include <utility>
  {% for inc in includes %}
  #include {{ inc }}
  {%- endfor %}
  {%- block api_version %}
  {%- if api_version %}

  static constexpr const char* k_{{ module_name }}_api_version = "{{ api_version }}";

  const char* get_{{ module_name }}_api_version()
  {
    return k_{{ module_name }}_api_version;
  }
  {%- endif %}
  {%- endblock %}

  void register_{{ module_name }}(lua_State* L)
  {
    luabridge::getGlobalNamespace(L)
      .beginNamespace("{{ module_name }}")
  {%- endblock %}
  {%- block api_version_registration %}
  {%- if api_version %}
        .addFunction("get_api_version", +[] () -> const char* { return k_{{ module_name }}_api_version; })
  {%- endif %}
  {%- endblock %}
  {%- for enum in enums %}
  {%- block enum scoped %}
        .beginNamespace("{{ enum.name }}")
  {%- for value in enum.values %}
  {%- block enum_value scoped %}
          .addProperty("{{ value.name }}", +[] { return static_cast<std::underlying_type_t<{{ enum.qualified_name }}>>({{ enum.qualified_name }}::{{ value.name }}); })
  {%- endblock %}
  {%- endfor %}
        .endNamespace()
  {%- endblock %}
  {%- endfor %}
  {%- for group in function_groups %}
  {%- block function_group scoped %}
  {%- if group.is_overloaded %}
        .addFunction("{{ group.name | camel_to_snake }}",
  {%- for fn in group.functions %}
  {% block function_overloaded scoped %}        luabridge::overload<{{ fn.params | map(attribute='type') | join(', ') }}>(&{{ fn.spelling }}){{ fn.overload_separator }}
  {%- endblock %}
  {%- endfor %}
        )
  {%- else %}
        .addFunction("{{ group.functions[0].name | camel_to_snake }}", &{{ group.functions[0].spelling }})
  {%- endif %}
  {%- endblock %}
  {%- endfor %}
  {%- for cls in classes %}
  {%- block class scoped %}
  {%- if cls.base_name %}
        .deriveClass<{{ cls.qualified_name }}, {{ cls.base_name }}>("{{ cls.name }}")
  {%- else %}
        .beginClass<{{ cls.qualified_name }}>("{{ cls.name }}")
  {%- endif %}
  {%- block class_constructors scoped %}
  {%- for ctor in cls.constructor_group.constructors %}
  {%- block class_constructor_group scoped %}
          .addConstructor<void (*)({{ ctor.params | map(attribute='raw_type') | join(', ') }})>()
  {%- endblock %}
  {%- endfor %}
  {%- endblock %}
  {%- block class_methods scoped %}
  {%- for group in cls.method_groups %}
  {%- if group.is_static %}
  {%- block class_static_method_group scoped %}
  {%- if group.is_overloaded %}
          .addStaticFunction("{{ group.name | camel_to_snake }}",
  {%- for method in group.methods %}
  {% block class_overloaded_static_method scoped %}          {% if method.overload_kind == "const" %}luabridge::constOverload{% elif method.overload_kind == "nonconst" %}luabridge::nonConstOverload{% else %}luabridge::overload{% endif %}<{{ method.params | map(attribute='type') | join(', ') }}>(&{{ cls.qualified_name }}::{{ method.spelling }}){{ method.overload_separator }}
  {%- endblock %}
  {%- endfor %}
          )
  {%- else %}
          .addStaticFunction("{{ group.name | camel_to_snake }}", &{{ cls.qualified_name }}::{{ group.methods[0].spelling }})
  {%- endif %}
  {%- endblock %}
  {%- else %}
  {%- block class_method_group scoped %}
  {%- if group.is_overloaded %}
          .addFunction("{{ group.name | camel_to_snake }}",
  {%- for method in group.methods %}
  {% block class_overloaded_method scoped %}          {% if method.overload_kind == "const" %}luabridge::constOverload{% elif method.overload_kind == "nonconst" %}luabridge::nonConstOverload{% else %}luabridge::overload{% endif %}<{{ method.params | map(attribute='type') | join(', ') }}>(&{{ cls.qualified_name }}::{{ method.spelling }}){{ method.overload_separator }}
  {%- endblock %}
  {%- endfor %}
          )
  {%- else %}
          .addFunction("{{ group.name | camel_to_snake }}", &{{ cls.qualified_name }}::{{ group.methods[0].spelling }})
  {%- endif %}
  {%- endblock %}
  {%- endif %}
  {%- endfor %}
  {%- endblock %}
  {%- block class_fields scoped %}
  {%- for field in cls.fields %}
  {%- block class_field scoped %}
  {%- if field.is_const %}
          .addProperty("{{ field.name | camel_to_snake }}", &{{ cls.qualified_name }}::{{ field.name }}, nullptr)
  {%- else %}
          .addProperty("{{ field.name | camel_to_snake }}", &{{ cls.qualified_name }}::{{ field.name }})
  {%- endif %}
  {%- endblock %}
  {%- endfor %}
  {%- endblock %}
  {%- block class_enums scoped %}
  {%- for enum in cls.enums %}
  {%- block class_enum scoped %}
          .beginNamespace("{{ enum.name }}")
  {%- for value in enum.values %}
  {%- block class_enum_value scoped %}
            .addProperty("{{ value.name }}", +[] { return static_cast<std::underlying_type_t<{{ enum.qualified_name }}>>({{ enum.qualified_name }}::{{ value.name }}); })
  {%- endblock %}
  {%- endfor %}
          .endNamespace()
  {%- endblock %}
  {%- endfor %}
  {%- endblock %}
        .endClass()
  {%- endblock %}
  {%- endfor %}
  {%- block epilogue %}
      .endNamespace();
  }
  {%- endblock %}
