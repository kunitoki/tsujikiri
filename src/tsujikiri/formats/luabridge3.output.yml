format_name: luabridge3
format_version: "1.0"
description: "LuaBridge3 C++ to Lua binding templates"
launguage: cpp

# Types that force a method/function/field to be commented out
unsupported_types:
  - CFStringRef
  - OSType

# Optional C++ → target-language type remapping (informational; apply via add_type_mapping transform)
type_mappings: {}

templates:
  line_comment: "//"
  module_name: "{{ module_name }}"
  include_directive: "#include {{ include }}\n"

  # ---- Globals ----
  header: ""

  prologue: |
    // DO NOT EDIT - Auto-generated LuaBridge3 bindings for {{ module_name }} by tsujikiri
    extern "C" {
    #include <lua.h>
    #include <lualib.h>
    #include <lauxlib.h>
    } // extern "C"

    #include <LuaBridge/LuaBridge.h>

    #include <utility>

    void register_{{ module_name }}(lua_State* L)
    {
      luabridge::getGlobalNamespace(L)
        .beginNamespace("{{ module_name }}")

  epilogue: |2
        .endNamespace();
    }

  footer: ""

  # ---- Casts ----
  class_overload_const_definition: " const"
  class_overload_cast: "luabridge::overload"
  class_const_overload_cast: "luabridge::constOverload"
  class_nonconst_overload_cast: "luabridge::nonConstOverload"
  function_overload_cast: "luabridge::overload"

  # ---- Class ----
  class_begin: |2
          .beginClass<{{ qualified_class_name }}>("{{ class_name }}")
  class_derived_begin: |2
          .deriveClass<{{ qualified_class_name }}, {{ class_base_name }}>("{{ class_name }}")
  class_end: |2
          .endClass()

  # ---- Regular methods ----
  class_method_begin: |2
            .addFunction("{{ method_name | camel_to_snake }}", &{{ qualified_class_name }}::{{ method_spelling }})
  class_method_end: ""
  class_overloaded_method_group_begin: |2
            .addFunction("{{ method_name | camel_to_snake }}",
  class_overloaded_method_begin: |2
              {{ method_overload_cast }}<{{ method_params | map(attribute='type') | join(', ') }}>(&{{ qualified_class_name }}::{{ method_spelling }}){{ method_overload_separator }}
  class_overloaded_method_group_end: |2
            )

  # ---- Static methods ----
  class_static_method_begin: |2
            .addStaticFunction("{{ method_name | camel_to_snake }}", &{{ qualified_class_name }}::{{ method_spelling }})
  class_overloaded_static_method_group_begin: |2
            .addStaticFunction("{{ method_name | camel_to_snake }}",
  class_overloaded_static_method_begin: |2
              {{ method_overload_cast }}<{{ method_params | map(attribute='type') | join(', ') }}>(&{{ qualified_class_name }}::{{ method_spelling }}){{ method_overload_separator }}
  class_overloaded_static_method_group_end: |2
            )

  # ---- Constructors ----
  class_constructor_begin: |2
            .addConstructor<void (*)({{ constructor_params | map(attribute='raw_type') | join(', ') }})>()
  class_overloaded_constructor_begin: |2
            .addConstructor<void (*)({{ constructor_params | map(attribute='raw_type') | join(', ') }})>()

  # ---- Fields / Properties ----
  class_field_begin: |2
            .addProperty("{{ field_name | camel_to_snake }}", &{{ qualified_class_name }}::{{ field_name }})
  class_readonly_field_begin: |2
            .addProperty("{{ field_name | camel_to_snake }}", &{{ qualified_class_name }}::{{ field_name }}, nullptr)

  # ---- Free functions ----
  function_begin: |2
          .addFunction("{{ function_name | camel_to_snake }}", &{{ function_spelling }})
  function_overloaded_group_begin: |2
          .addFunction("{{ function_name | camel_to_snake }}",
  function_overloaded_begin: |2
            {{ function_overload_cast }}<{{ function_params | map(attribute='type') | join(', ') }}>(&{{ function_spelling }}){{ function_overload_separator }}
  function_overloaded_group_end: |2
          )

  # ---- Enums ----
  enum_begin: |2
          .beginNamespace("{{ enum_name }}")
  enum_value: |2
            .addProperty("{{ value_name }}", +[] { return static_cast<std::underlying_type_t<{{ qualified_enum_name }}>>({{ qualified_enum_name }}::{{ value_name }}); })
  enum_end: |2
          .endNamespace()
