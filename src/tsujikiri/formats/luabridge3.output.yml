format_name: luabridge3
format_version: "1.0"
description: "LuaBridge3 C++ to Lua binding templates"

# Types that force a method/function/field to be commented out
unsupported_types:
  - CFStringRef
  - OSType

# Optional C++ → target-language type remapping (informational; apply via add_type_mapping transform)
type_mappings: {}

templates:
  line_comment: "//"
  module_name: "{{ module_name }}"
  include_directive: "#include {{ include }}\n"

  # ---- Globals ----
  header: ""

  prologue: |
    // DO NOT EDIT — Auto-generated LuaBridge3 bindings for {{ module_name }} by tsujikiri
    extern "C" {
    #include <lua.h>
    #include <lualib.h>
    #include <lauxlib.h>
    }
    #include <LuaBridge/LuaBridge.h>

    #include <utility>

    void register_{{ module_name }}(lua_State* L)
    {
      luabridge::getGlobalNamespace(L)

  epilogue: |
    ;
    }

  footer: ""

  # ---- Casts ----
  class_overload_const_definition: " const"
  class_overload_cast: "luabridge::overload"
  class_const_overload_cast: "luabridge::constOverload"
  class_nonconst_overload_cast: "luabridge::nonConstOverload"
  function_overload_cast: "luabridge::overload"

  # ---- Class ----
  class_begin: |
    .beginClass<{{ qualified_class_name }}>("{{ class_name }}")
  class_derived_begin: |
    .deriveClass<{{ qualified_class_name }}, {{ class_base_name }}>("{{ class_name }}")
  class_end: |
    .endClass()
  class_methods_begin: ""
  class_methods_end: ""

  # ---- Regular methods ----
  class_method_begin: |
    {{ method_comment }}.addFunction("{{ method_name }}", &{{ qualified_class_name }}::{{ method_spelling }})
  class_method_end: ""
  class_overloaded_method_group_begin: |
    {{ method_comment }}.addFunction("{{ method_name }}",
  class_overloaded_method_group_end: ")"
  class_overloaded_method_begin: |
    {{ method_comment }}{{ method_overload_cast }}<{{ method_params | map(attribute='type') | join(', ') }}>(&{{ qualified_class_name }}::{{ method_spelling }}){{ method_overload_separator }}
  class_overloaded_method_end: ""

  # ---- Static methods ----
  class_static_method_begin: |
    {{ method_comment }}.addStaticFunction("{{ method_name }}", &{{ qualified_class_name }}::{{ method_spelling }})
  class_static_method_end: ""
  class_overloaded_static_method_group_begin: |
    {{ method_comment }}.addStaticFunction("{{ method_name }}",
  class_overloaded_static_method_group_end: ")"
  class_overloaded_static_method_begin: |
    {{ method_comment }}{{ method_overload_cast }}<{{ method_params | map(attribute='type') | join(', ') }}>(&{{ qualified_class_name }}::{{ method_spelling }}){{ method_overload_separator }}
  class_overloaded_static_method_end: ""

  # ---- Constructors ----
  class_constructor_begin: |
    {{ method_comment }}.addConstructor<void (*)({{ constructor_params | map(attribute='raw_type') | join(', ') }})>()
  class_constructor_end: ""
  class_overloaded_constructor_begin: |
    {{ method_comment }}.addConstructor<void (*)({{ constructor_params | map(attribute='raw_type') | join(', ') }})>()
  class_overloaded_constructor_end: ""

  # ---- Fields / Properties ----
  class_field_begin: |
    {{ field_comment }}.addProperty("{{ field_name }}", &{{ qualified_class_name }}::{{ field_name }})
  class_field_end: ""
  class_readonly_field_begin: |
    {{ field_comment }}.addProperty("{{ field_name }}", &{{ qualified_class_name }}::{{ field_name }}, nullptr)
  class_readonly_field_end: ""

  # ---- Free functions ----
  function_begin: |
    {{ function_comment }}.addFunction("{{ function_name }}", &{{ function_spelling }})
  function_end: ""
  function_overloaded_group_begin: |
    {{ function_comment }}.addFunction("{{ function_name }}",
  function_overloaded_group_end: ")"
  function_overloaded_begin: |
    {{ function_comment }}{{ function_overload_cast }}<{{ function_params | map(attribute='type') | join(', ') }}>(&{{ function_spelling }}){{ function_overload_separator }}
  function_overloaded_end: ""

  # ---- Enums ----
  enum_begin: |
    .beginNamespace("{{ enum_name }}")
  enum_end: |
    .endNamespace()
  enum_value: |
    .addProperty("{{ value_name }}", +[] { return static_cast<std::underlying_type_t<{{ qualified_enum_name }}>>({{ qualified_enum_name }}::{{ value_name }}); })
