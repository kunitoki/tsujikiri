format_name: luabridge3
format_version: "1.0"
description: "LuaBridge3 C++ to Lua binding templates"
language: cpp

# Types that force a method/function/field to be excluded from output
unsupported_types:
  - CFStringRef
  - OSType

# Optional C++ → target-language type remapping (use add_type_mapping transform)
type_mappings: {}

# C++ operator overload → Lua metamethod name mapping
operator_mappings:
  "operator+": "__add"
  "operator-": "__sub"
  "operator-unary": "__unm"
  "operator*": "__mul"
  "operator/": "__div"
  "operator%": "__mod"
  "operator==": "__eq"
  "operator<": "__lt"
  "operator<=": "__le"
  "operator()": "__call"
  "operator&": "__band"
  "operator|": "__bor"
  "operator^": "__bxor"
  "operator~": "__bnot"
  "operator<<": "__shl"
  "operator>>": "__shr"

template_file: "luabridge3.output.tpl"
