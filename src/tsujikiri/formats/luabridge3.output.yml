format_name: luabridge3
format_version: "1.0"
description: "LuaBridge3 C++ to Lua binding templates"
language: cpp

# Types that force a method/function/field to be excluded from output
unsupported_types:
  - CFStringRef
  - OSType

# Optional C++ → target-language type remapping (use add_type_mapping transform)
type_mappings: {}

# C++ operator overload → Lua metamethod name mapping
# operator<< maps to __tostring to generate a lambda using std::ostringstream
operator_mappings:
  "operator+": "__add"
  "operator+unary": "__unm"
  "operator-": "__sub"
  "operator-unary": "__unm"
  "operator*": "__mul"
  "operator/": "__div"
  "operator%": "__mod"
  "operator==": "__eq"
  "operator<": "__lt"
  "operator<=": "__le"
  "operator<<": "__tostring"
  "operator[]": "__index"
  "operator()": "__call"

template_file: "luabridge3.output.tpl"
