sources:
  - path: "samplebinding.hpp"
    parse_args: ["-std=c++17"]

filters:
  namespaces: ["sample"]
  constructors:
    include: true

transforms:
  - stage: set_type_hint
    class: Icecream
    holder_type: std::shared_ptr

format_overrides:
  pybind11:
    generation:
      includes: ['"samplebinding/samplebinding.hpp"']
