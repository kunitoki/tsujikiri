name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  validate-stubs:
    name: Validate stubs are up to date
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Regenerate stubs and check for drift
        run: |
          uv run stubgen -p tsujikiri -o /tmp/stubs_check
          python3 - << 'EOF'
          import sys, pathlib, filecmp
          src = pathlib.Path('src/tsujikiri')
          gen = pathlib.Path('/tmp/stubs_check/tsujikiri')
          errors = []
          for stub in sorted(gen.rglob('*.pyi')):
              committed = src / stub.relative_to(gen)
              if not committed.exists() or not filecmp.cmp(stub, committed, shallow=False):
                  errors.append(str(committed))
          if errors:
              print('Stubs are out of date:\n  ' + '\n  '.join(errors))
              print("Run 'just stubs' and commit the result.")
              sys.exit(1)
          EOF

  build:
    name: Build distribution
    needs: validate-stubs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Validate version matches tag
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          INIT_VERSION=$(grep -m1 '__version__' src/tsujikiri/__init__.py | sed "s/.*= ['\"]//;s/['\"].*//")
          if [ "$TAG_VERSION" != "$INIT_VERSION" ]; then
            echo "Version mismatch: tag=${TAG_VERSION}, __init__.py=${INIT_VERSION}"
            exit 1
          fi
          echo "Version match: ${TAG_VERSION}"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build wheel and sdist
        run: uv build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  github-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  pypi-publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/tsujikiri
    permissions:
      id-token: write

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
