name: Tests

on:
  push:
    branches:
      - main
      - "dev/**"
    paths:
      - ".github/workflows/tests.yml"
      - "src/**"
      - "tests/**"
      - "requirements-dev.txt"
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    branches:
      - "dev/**"
    paths:
      - ".github/workflows/tests.yml"
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "requirements-dev.txt"
      - "uv.lock"

jobs:
  test:
    name: ${{ matrix.os_short }}-${{ matrix.clang }}-${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        clang: ["default", "clang19", "clang20", "clang21", "clang22"]
        python-version: ["3.12", "3.13", "3.14"]
        include:
          - os: ubuntu-latest
            os_short: ubuntu
          - os: macos-latest
            os_short: macos
          - os: windows-latest
            os_short: windows

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: false
          python-version: ${{ matrix.python-version }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        shell: bash
        run: |
          if [ "${{ matrix.clang }}" = "default" ]; then
            uv sync --extra dev
          else
            uv sync --extra dev --extra ${{ matrix.clang }}
          fi

      - name: Run tests
        run: uv run pytest -n auto --cov=tsujikiri --cov-branch --cov-report=xml --cov-report=term-missing -vv

      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest' && matrix.clang == 'clang22' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: kunitoki/tsujikiri
          files: ./coverage.xml
          fail_ci_if_error: true
